<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор свадебного приглашения</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .editor-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 400px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 30px;
            overflow-y: auto;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .preview-area {
            margin-left: 400px;
            flex: 1;
            background: #f0f0f0;
            padding: 20px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            margin-bottom: 15px;
            color: #666;
            font-weight: 400;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            margin-bottom: 15px;
            transition: border 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #999;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-input-label {
            display: block;
            padding: 12px;
            background: #f9f9f9;
            border: 2px dashed #ddd;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            color: #666;
        }

        .file-input-label:hover {
            border-color: #999;
            background: #f0f0f0;
        }

        .btn {
            padding: 14px 28px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: #333;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #666;
        }

        .btn-secondary:hover {
            background: #555;
        }

        .btn-success {
            background: #4CAF50;
        }

        .btn-success:hover {
            background: #45a049;
        }

        /* Preview Styles */
        .preview-frame {
            background: #fff;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* Section 1: Hero */
        .section-hero {
            position: relative;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-hero img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
            padding: 40px;
        }

        .hero-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-style: italic;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 56px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .hero-names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 20px;
        }

        .hero-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
        }

        /* Section 2: Save the Date */
        .section-save-date {
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-save-date img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            opacity: 0.6;
        }

        .save-date-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #333;
        }

        .save-date-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: #666;
        }

        .save-date-day {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .save-date-names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 64px;
            font-weight: 300;
            letter-spacing: 8px;
        }

        /* Section 3: Calendar */
        .section-calendar {
            padding: 100px 40px;
            text-align: center;
            background: #fafafa;
        }

        .calendar-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .calendar-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .calendar-month {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .calendar-day-header {
            font-size: 12px;
            color: #999;
            padding: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .calendar-day-header.weekend {
            color: #d4a5a5;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .calendar-day.active {
            background: #1a1a1a;
            color: #fff;
            width: 50px;
            height: 50px;
            margin: 0 auto;
        }

        .calendar-date-big {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            margin-top: 30px;
            letter-spacing: 4px;
        }

        /* Section 4: Countdown */
        .section-countdown {
            padding: 100px 40px;
            text-align: center;
            background: #fff;
        }

        .countdown-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .countdown-item {
            background: #fafafa;
            padding: 30px 20px;
            border: 1px solid #e0e0e0;
        }

        .countdown-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 300;
            display: block;
            margin-bottom: 10px;
        }

        .countdown-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Section 5: Timing */
        .section-timing {
            padding: 100px 40px;
            background: #fafafa;
        }

        .timing-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .timing-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 20px;
        }

        .timing-gather {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: #666;
        }

        .timeline {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }

        .timeline-items {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .timeline-item {
            text-align: center;
            position: relative;
        }

        .timeline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .timeline-icon svg {
            width: 40px;
            height: 40px;
            stroke: #666;
        }

        .timeline-time {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .timeline-label {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        /* Section 6: Location */
        .section-location {
            padding: 100px 40px;
            text-align: center;
            background: #fff;
        }

        .location-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 40px;
        }

        .location-text {
            max-width: 600px;
            margin: 0 auto 40px;
            font-size: 14px;
            line-height: 1.8;
            color: #666;
        }

        .location-image {
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
        }

        .location-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Section 7: Dress Code */
        .section-dresscode {
            padding: 100px 40px;
            text-align: center;
            background: #fafafa;
        }

        .dresscode-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 30px;
        }

        .dresscode-text {
            max-width: 600px;
            margin: 0 auto 50px;
            font-size: 14px;
            line-height: 1.8;
            color: #666;
        }

        .color-palette {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .color-item {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Section 8: Important Info */
        .section-important {
            padding: 100px 40px;
            background: #fff;
        }

        .important-slider {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .important-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .important-text {
            font-size: 14px;
            line-height: 2;
            color: #666;
            margin-bottom: 30px;
        }

        .slider-counter {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        /* Section 9: RSVP */
        .section-rsvp {
            padding: 100px 40px;
            background: #fafafa;
        }

        .rsvp-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .rsvp-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 20px;
        }

        .rsvp-deadline {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 50px;
        }

        .rsvp-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .rsvp-column h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 20px;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 1px solid #ddd;
            font-family: 'Montserrat', sans-serif;
            background: transparent;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            border-bottom-color: #1a1a1a;
        }

        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #666;
        }

        .radio-item input, .checkbox-item input {
            cursor: pointer;
        }

        .btn-submit {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 30px;
        }

        .btn-submit button {
            padding: 16px 60px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Section 10: Contact */
        .section-contact {
            padding: 100px 40px;
            position: relative;
            overflow: hidden;
        }

        .section-contact::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><rect fill="%23f5f5f5" width="1200" height="600"/></svg>');
            opacity: 0.5;
        }

        .contact-box {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 60px 40px;
            text-align: center;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        .contact-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 40px;
        }

        .contact-person {
            margin-bottom: 30px;
        }

        .contact-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .contact-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .contact-phone {
            font-size: 14px;
            color: #666;
        }

        .contact-btn {
            margin-top: 30px;
        }

        .contact-btn button {
            padding: 14px 50px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Section 11: Wishes */
        .section-wishes {
            padding: 100px 40px;
            background: #333;
            color: #fff;
            text-align: center;
        }

        .wishes-slider {
            max-width: 800px;
            margin: 0 auto;
        }

        .wishes-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .wishes-text {
            font-size: 14px;
            line-height: 2;
            opacity: 0.8;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            
            .preview-area {
                margin-left: 0;
            }
            
            .timeline-items,
            .countdown-grid,
            .rsvp-form {
                grid-template-columns: 1fr;
            }
            
            .hero-names {
                font-size: 42px;
            }
            
            .hero-title {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- Sidebar Editor -->
        <div class="sidebar">
            <h1>РЕДАКТОР</h1>
            
            <!-- Section 1: Main Info -->
            <div class="section">
                <div class="section-title">Основная информация</div>
                
                <label>Имя невесты</label>
                <input type="text" id="brideName" value="Виктория" onchange="updatePreview()">
                
                <label>Имя жениха</label>
                <input type="text" id="groomName" value="Илья" onchange="updatePreview()">
                
                <label>Дата свадьбы</label>
                <input type="date" id="weddingDate" value="2026-04-17" onchange="updatePreview()">
                
                <label>Фото главной секции</label>
                <div class="file-input-wrapper">
                    <input type="file" accept="image/*" onchange="handleImageUpload(this, 'heroImage')">
                    <div class="file-input-label">Нажмите для загрузки фото</div>
                </div>
            </div>

            <!-- Section 2: Timing -->
            <div class="section">
                <div class="section-title">Тайминг</div>
                
                <label>Время сбора гостей</label>
                <input type="time" id="gatherTime" value="16:00" onchange="updatePreview()">
                
                <label>Время церемонии</label>
                <input type="time" id="ceremonyTime" value="16:30" onchange="updatePreview()">
                
                <label>Время банкета</label>
                <input type="time" id="banquetTime" value="17:00" onchange="updatePreview()">
                
                <label>Время завершения</label>
                <input type="time" id="endTime" value="23:00" onchange="updatePreview()">
            </div>

            <!-- Section 3: Location -->
            <div class="section">
                <div class="section-title">Локация</div>
                
                <label>Название места</label>
                <input type="text" id="locationName" value="Загородный клуб" onchange="updatePreview()">
                
                <label>Описание</label>
                <textarea id="locationDesc" onchange="updatePreview()">Наша свадьба пройдет в живописном месте на природе. Вас ждет уютная атмосфера, вкусная еда и прекрасная компания.</textarea>
                
                <label>Фото локации</label>
                <div class="file-input-wrapper">
                    <input type="file" accept="image/*" onchange="handleImageUpload(this, 'locationImage')">
                    <div class="file-input-label">Нажмите для загрузки фото</div>
                </div>
            </div>

            <!-- Section 4: Dress Code -->
            <div class="section">
                <div class="section-title">Дресс-код</div>
                
                <label>Текст о дресс-коде</label>
                <textarea id="dresscodeText" onchange="updatePreview()">Мы очень ждём и готовимся к нашему незабываемому дню! Поддержите нас Вашими улыбками и объятиями, а также красивыми нарядами в палитре мероприятия.</textarea>
                
                <label>Цвет 1</label>
                <input type="color" id="color1" value="#4a5d4a" onchange="updatePreview()">
                
                <label>Цвет 2</label>
                <input type="color" id="color2" value="#5a4a4a" onchange="updatePreview()">
                
                <label>Цвет 3</label>
                <input type="color" id="color3" value="#8a7a7a" onchange="updatePreview()">
                
                <label>Цвет 4</label>
                <input type="color" id="color4" value="#d4c4b4" onchange="updatePreview()">
                
                <label>Цвет 5</label>
                <input type="color" id="color5" value="#1a1a1a" onchange="updatePreview()">
            </div>

            <!-- Section 5: Important Info -->
            <div class="section">
                <div class="section-title">Важная информация</div>
                
                <label>Слайд 1</label>
                <textarea id="important1" onchange="updatePreview()">Апрель в горах — время капризное. Днем может быть тепло и солнечно, а к вечеру — прохладно и ветрено. Подумайте о комфортном теплом образе заранее.</textarea>
                
                <label>Слайд 2</label>
                <textarea id="important2" onchange="updatePreview()">Наша свадьба — это не просто один день, а целый уикенд в горах. И мы хотим, чтобы его организация стала для вас легкой и интересной.</textarea>
            </div>

            <!-- Section 6: Contact -->
            <div class="section">
                <div class="section-title">Контакты</div>
                
                <label>Имя для связи</label>
                <input type="text" id="contactName" value="Виктория" onchange="updatePreview()">
                
                <label>Телефон</label>
                <input type="text" id="contactPhone" value="+7 (977) 392-90-39" onchange="updatePreview()">
            </div>

            <!-- Actions -->
            <div class="section">
                <div class="section-title">Действия</div>
                <button class="btn btn-success" onclick="generateInvitation()">Сгенерировать приглашение</button>
                <button class="btn" onclick="saveToStorage()">Сохранить</button>
                <button class="btn btn-secondary" onclick="loadFromStorage()">Загрузить</button>
                <button class="btn btn-secondary" onclick="exportHTML()">Экспорт HTML</button>

        // Generate calendar days
        function generateCalendarDays(date, activeDay) {
            const year = date.getFullYear();
            const month = date.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startingDay = firstDay.getDay() || 7;
            
            let html = '';
            
            // Empty cells before first day
            for (let i = 1; i < startingDay; i++) {
                html += '<div class="calendar-day"></div>';
            }
            
            // Days
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const isWeekend = (startingDay + day - 1) % 7 >= 5;
                const isActive = day === parseInt(activeDay);
                html += `<div class="calendar-day${isActive ? ' active' : ''}${isWeekend && !isActive ? ' weekend' : ''}">${day}</div>`;
            }
            
            return html;
        }

        // Start countdown
        function startCountdown(targetDate) {
            setInterval(() => {
                const now = new Date();
                const diff = targetDate - now;
                
                if (diff > 0) {
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    
                    const daysEl = document.getElementById('countdown-days');
                    const hoursEl = document.getElementById('countdown-hours');
                    const minutesEl = document.getElementById('countdown-minutes');
                    const secondsEl = document.getElementById('countdown-seconds');
                    
                    if (daysEl) daysEl.textContent = String(days).padStart(2, '0');
                    if (hoursEl) hoursEl.textContent = String(hours).padStart(2, '0');
                    if (minutesEl) minutesEl.textContent = String(minutes).padStart(2, '0');
                    if (secondsEl) secondsEl.textContent = String(seconds).padStart(2, '0');
                }
            }, 1000);
        }

        // Save to localStorage
        function saveToStorage() {
            const data = {
                brideName: document.getElementById('brideName').value,
                groomName: document.getElementById('groomName').value,
                weddingDate: document.getElementById('weddingDate').value,
                gatherTime: document.getElementById('gatherTime').value,
                ceremonyTime: document.getElementById('ceremonyTime').value,
                banquetTime: document.getElementById('banquetTime').value,
                endTime: document.getElementById('endTime').value,
                locationName: document.getElementById('locationName').value,
                locationDesc: document.getElementById('locationDesc').value,
                dresscodeText: document.getElementById('dresscodeText').value,
                important1: document.getElementById('important1').value,
                important2: document.getElementById('important2').value,
                contactName: document.getElementById('contactName').value,
                contactPhone: document.getElementById('contactPhone').value,
                color1: document.getElementById('color1').value,
                color2: document.getElementById('color2').value,
                color3: document.getElementById('color3').value,
                color4: document.getElementById('color4').value,
                color5: document.getElementById('color5').value,
                imageData: imageData
            };
            
            localStorage.setItem('weddingInvitation', JSON.stringify(data));
            alert('Данные сохранены!');
        }

        // Load from localStorage
        function loadFromStorage() {
            const saved = localStorage.getItem('weddingInvitation');
            if (saved) {
                const data = JSON.parse(saved);
                
                document.getElementById('brideName').value = data.brideName || 'Виктория';
                document.getElementById('groomName').value = data.groomName || 'Илья';
                document.getElementById('weddingDate').value = data.weddingDate || '2026-04-17';
                document.getElementById('gatherTime').value = data.gatherTime || '16:00';
                document.getElementById('ceremonyTime').value = data.ceremonyTime || '16:30';
                document.getElementById('banquetTime').value = data.banquetTime || '17:00';
                document.getElementById('endTime').value = data.endTime || '23:00';
                document.getElementById('locationName').value = data.locationName || '';
                document.getElementById('locationDesc').value = data.locationDesc || '';
                document.getElementById('dresscodeText').value = data.dresscodeText || '';
                document.getElementById('important1').value = data.important1 || '';
                document.getElementById('important2').value = data.important2 || '';
                document.getElementById('contactName').value = data.contactName || '';
                document.getElementById('contactPhone').value = data.contactPhone || '';
                document.getElementById('color1').value = data.color1 || '#4a5d4a';
                document.getElementById('color2').value = data.color2 || '#5a4a4a';
                document.getElementById('color3').value = data.color3 || '#8a7a7a';
                document.getElementById('color4').value = data.color4 || '#d4c4b4';
                document.getElementById('color5').value = data.color5 || '#1a1a1a';
                
                if (data.imageData) {
                    imageData = data.imageData;
                }
                
                updatePreview();
                alert('Данные загружены!');
            } else {
                alert('Нет сохраненных данных');
            }
        }

        // Generate final invitation
        function generateInvitation() {
            const html = document.getElementById('previewFrame').innerHTML;
            const brideName = document.getElementById('brideName').value;
            const groomName = document.getElementById('groomName').value;
            
            const finalHTML = `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свадьба ${brideName} и ${groomName}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #fff; color: #333; }
        ${document.querySelector('style').innerHTML}
    </style>
</head>
<body>
    ${html}
    <script>
        ${document.querySelector('script').innerHTML}
        document.addEventListener('DOMContentLoaded', function() {
            const weddingDate = new Date('${document.getElementById('weddingDate').value}');
            startCountdown(weddingDate);
        });
    <\/script>
</body>
</html>`;
            
            const blob = new Blob([finalHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wedding-${brideName}-${groomName}.html`;
            a.click();
            URL.revokeObjectURL(url);
            
            alert('Приглашение сгенерировано и скачано!');
        }

        // Export HTML
        function exportHTML() {
            generateInvitation();
        }
    </script>
</body>
</html>
